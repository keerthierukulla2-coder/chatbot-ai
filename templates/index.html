<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 500px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .chat-header {
      background: #2563eb;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .chat-box {
      height: 500px;
      overflow-y: auto;
      padding: 16px;
      background: #fafafa;
    }

    .message {
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 82%;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
      margin-right: auto;
      text-align: left;
    }

    .sources {
      margin-top: 10px;
      font-size: 13px;
    }

    .sources-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .sources a {
      display: block;
      color: #1d4ed8;
      text-decoration: none;
      margin-top: 4px;
    }

    .sources a:hover {
      text-decoration: underline;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #ddd;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    .input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 15px;
    }

    .input-area button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">AI Chatbot</div>

    <div class="chat-box" id="chat-box">
      <div class="message bot">Hi! I am an intelligent conversational AI chatbot. Ask me anything.</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ask a question..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);

      input.value = "";

      const botDiv = document.createElement("div");
      botDiv.className = "message bot";
      botDiv.textContent = "Thinking...";
      chatBox.appendChild(botDiv);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        botDiv.textContent = data.response || "No response received.";

        if (data.sources && data.sources.length > 0) {
          const srcDiv = document.createElement("div");
          srcDiv.className = "sources";

          const titleDiv = document.createElement("div");
          titleDiv.className = "sources-title";
          titleDiv.textContent = "Sources:";
          srcDiv.appendChild(titleDiv);

          data.sources.forEach(src => {
            const link = document.createElement("a");
            link.href = src.url;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = src.title || src.url;
            srcDiv.appendChild(link);
          });

          botDiv.appendChild(srcDiv);
        }
      } catch (error) {
        botDiv.textContent = "Something went wrong while getting the answer.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
